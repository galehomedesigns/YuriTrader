  function chart(r) {
    const bars = (r.timeline||[]).filter(x=>x.o!=null);
    const W=1100,H=400,mL=58,mR=86,mT=14,mB=26, pw=W-mL-mR, ph=H-mT-mB, n=bars.length;
    let lo=Infinity,hi=-Infinity;
    bars.forEach(b=>{lo=Math.min(lo,b.l);hi=Math.max(hi,b.h);});
    [r.entry,r.stop,r.target].forEach(v=>{if(v!=null){lo=Math.min(lo,+v);hi=Math.max(hi,+v);}});
    bars.forEach(b=>{[b.sma20,b.sma200,b.stop].forEach(v=>{if(v!=null){lo=Math.min(lo,v);hi=Math.max(hi,v);}});});
    const pad=(hi-lo)*0.06||0.1; lo-=pad; hi+=pad;
    const xOf=i=>mL+pw*(i+0.5)/n, yOf=p=>mT+ph*(hi-p)/(hi-lo), cw=Math.max(2,pw/n*0.6);
    let s=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`;
    for(let k=0;k<=5;k++){const p=lo+(hi-lo)*k/5,y=yOf(p);
      s+=`<line x1="${mL}" y1="${y.toFixed(1)}" x2="${mL+pw}" y2="${y.toFixed(1)}" stroke="${CO.grid}"/>`;
      s+=`<text x="${mL-6}" y="${(y+3).toFixed(1)}" fill="${CO.axis}" font-size="11" text-anchor="end">${p.toFixed(2)}</text>`;}
    bars.forEach((b,i)=>{if(i%5===0||i===n-1)s+=`<text x="${xOf(i).toFixed(1)}" y="${H-8}" fill="${CO.axis}" font-size="10" text-anchor="middle">${b.t}</text>`;});
    // SMA polylines
    const poly=(key,col)=>{const pts=bars.map((b,i)=>b[key]!=null?`${xOf(i).toFixed(1)},${yOf(b[key]).toFixed(1)}`:null).filter(Boolean).join(' ');
      return pts?`<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.6" opacity="0.9"/>`:'';};
    s+=poly('sma200',CO.sma200)+poly('sma20',CO.sma20);
    // entry / target / stop lines
    const hline=(p,col,dash,lbl)=>p==null?'':`<line x1="${mL}" y1="${yOf(p).toFixed(1)}" x2="${mL+pw}" y2="${yOf(p).toFixed(1)}" stroke="${col}" stroke-width="1.2" stroke-dasharray="${dash}"/><text x="${mL+pw+4}" y="${(yOf(p)+3).toFixed(1)}" fill="${col}" font-size="11">${lbl} ${(+p).toFixed(2)}</text>`;
    s+=hline(r.target,CO.target,'5 4','target');
    s+=hline(r.entry,CO.entry,'6 4','entry');
    s+=hline(r.stop,CO.stop,'2 3','stop');
    // candles
    bars.forEach((b,i)=>{const x=xOf(i),up=b.c>=b.o,col=up?CO.up:CO.dn;
      s+=`<line x1="${x.toFixed(1)}" y1="${yOf(b.h).toFixed(1)}" x2="${x.toFixed(1)}" y2="${yOf(b.l).toFixed(1)}" stroke="${col}" stroke-width="1.1"/>`;
      const yo=yOf(b.o),yc=yOf(b.c);s+=`<rect x="${(x-cw/2).toFixed(1)}" y="${Math.min(yo,yc).toFixed(1)}" width="${cw.toFixed(1)}" height="${Math.max(1,Math.abs(yo-yc)).toFixed(1)}" fill="${col}"/>`;});
    // markers
    bars.forEach((b,i)=>{const x=xOf(i);
      if(/ENTRY/.test(b.event||'')){const y=yOf(b.l)+12;s+=`<path d="M ${x-5} ${y} L ${x+5} ${y} L ${x} ${y-8} Z" fill="${CO.entry}"/><text x="${x}" y="${y+12}" fill="${CO.entry}" font-size="10" text-anchor="middle">BUY</text>`;}
      if(/TARGET|STOP —|SELL-OFF/.test(b.event||'')){const c2=/TARGET/.test(b.event)?CO.target:(/SELL-OFF/.test(b.event)?CO.selloff:CO.stop);
        s+=`<line x1="${x.toFixed(1)}" y1="${mT}" x2="${x.toFixed(1)}" y2="${mT+ph}" stroke="${c2}" stroke-width="1" stroke-dasharray="4 3"/><text x="${x}" y="${mT+11}" fill="${c2}" font-size="10" text-anchor="middle">EXIT</text>`;}});
    return s+`</svg>`;
  }

  function card(r) {
    const ex=r.exit||{};
    const hasT=r.target!=null;
    const tape=(r.timeline||[]).map(x=>{let e=x.event||'',rc='';
      if(/TARGET|STOP exit|SELL-OFF/.test(e))rc='r-exit';else if(/ENTRY/.test(e))rc='r-entry';else if(/trail|breakeven|\+1R|ARMED/.test(e))rc='r-stopmove';else if(x.shares===0&&x.if_held!=null)rc='r-flat';
      return `<tr class="${rc}"><td class="num">${x.t}</td><td class="num">${f2(x.o)}</td><td class="num">${f2(x.h)}</td><td class="num">${f2(x.l)}</td><td class="num">${f2(x.c)}</td>
        <td class="num">${f2(x.sma20)}</td><td class="num">${f2(x.sma200)}</td><td class="num">${x.stop!=null?'$'+f2(x.stop):''}</td>
        <td class="num">${x.shares||''}</td><td class="ev">${esc(e)}</td></tr>`;}).join('');
    const plpct=(r.position_cost)?(r.realized_pl/r.position_cost*100):null;
    return `<div class="card"><h2>${r.symbol} <span class="badge badge-muted">${esc(r.tv)}</span>
        <span class="pill">gap ${r.premarket_gap_pct>0?'+':''}${r.premarket_gap_pct}% · ${f2(r.prev_close)}→${f2(r.today_open)} · armed ${r.arm_t} · ${esc(r.loc)}</span></h2>
      <div class="funded">bought <b>${r.shares} @ $${f2(r.entry)}</b> (placed $${f2(r.position_cost)}) · stop <b>$${f2(r.stop)}</b> (${r.risk_pct}%, wick)${hasT?` · target <b>$${f2(r.target)}</b> (3R)`:` · <b>push-trail</b>`} ·
        exit $${f2(ex.price)} @ ${ex.time||''} → <b class="${cls(r.realized_pl)}">${money(r.realized_pl)}</b> (${plpct!=null?(plpct>=0?'+':'')+plpct.toFixed(2)+'%':''})</div>
      <div class="legend">
        <span><span class="swatch" style="background:#69f0ae"></span>up</span><span><span class="swatch" style="background:#ef5350"></span>down</span>
        <span><span class="swatch" style="background:#7c8aff"></span>SMA20</span><span><span class="swatch" style="background:#ffa726"></span>SMA200</span>
        <span><span class="swatch" style="background:#c77dff"></span>entry</span><span><span class="swatch" style="background:#ff1744"></span>stop</span>
        ${hasT?'<span><span class="swatch" style="background:#00c853"></span>target 3R</span>':''}<span><span class="swatch" style="background:#ffc107"></span>30-min sell-off</span></div>
      <div class="chart-wrap">${chart(r)}</div>
      <details><summary>exact 2-min numbers</summary>
        <table class="tape"><tr><th>Time</th><th class="num">O</th><th class="num">H</th><th class="num">L</th><th class="num">C</th>
          <th class="num">SMA20</th><th class="num">SMA200</th><th class="num">Stop</th><th class="num">Sh</th><th>Event</th></tr>${tape}</table></details></div>`;
  }

  function panelBody(p) {
    const t=p.totals;
    let h=`<div class="apptot ${cls(t.realized_pl)}">${money(t.realized_pl)} <span class="flat" style="font-size:0.8rem">(${t.avg_pct>=0?'+':''}${t.avg_pct}%/trade · ${t.names} trades · charts: top ${t.shown})</span></div>`;
    h+= p.rows.length ? p.rows.map(card).join('') : '<div class="empty">no qualifying trades this day</div>';
    return h;
  }

  function renderDay(d) {
    const s=d.sweet.totals, b=d.baseline.totals;
    let html=`<div class="stat-row">
      <div class="stat"><div class="value ${cls(s.realized_pl)}">${money(s.realized_pl)}</div><div class="label">New-sim P&L (${s.avg_pct>=0?'+':''}${s.avg_pct}%/trade)</div></div>
      <div class="stat"><div class="value ${cls(b.realized_pl)}">${money(b.realized_pl)}</div><div class="label">Baseline P&L (${b.avg_pct>=0?'+':''}${b.avg_pct}%/trade)</div></div>
      <div class="stat"><div class="value">${s.names} / ${b.names}</div><div class="label">trades: new-sim / baseline</div></div>
      <div class="stat"><div class="value" style="font-size:0.92rem">${esc(d.source||'')}</div><div class="label">${d.day} · data source · ≤$300 only</div></div></div>`;
    html+=`<div class="split">
      <div class="appcol"><div class="apphdr base">⚙ BASELINE — live rules (TIGHT on · loc by open · wick stop · push-trail · 30-min)</div>${panelBody(d.baseline)}</div>
      <div class="appcol"><div class="apphdr sweet">★ NEW SIM — sweet-spot (TIGHT off · loc by close · wick stop · 3R target · 30-min)</div>${panelBody(d.sweet)}</div>
    </div>`;
    document.getElementById('day').innerHTML=html;
  }

  // tabs
  const tabs=document.getElementById('tabs');
  data.days.forEach((d,idx)=>{const el=document.createElement('div');el.className='tab'+(idx===0?' active':'');
    el.textContent=d.day;el.onclick=()=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');renderDay(d);};
    tabs.appendChild(el);});
  if(data.days.length) renderDay(data.days[0]);
})();
</script>
</body>
</html>
