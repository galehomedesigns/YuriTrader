": -3.03}, {"sym": "BNTX", "gap_pct": 0.54, "ret_pct": 0.526, "ret_usd": 1.07}], "day_pl": 1.16, "day_ret_pct": 0.114, "capital": 1021.78}, {"day": "2026-06-18", "slot": 204.36, "n": 4, "picks": [{"sym": "DIS", "gap_pct": 0.93, "ret_pct": -0.392, "ret_usd": -0.8}, {"sym": "BAC", "gap_pct": 1.26, "ret_pct": -0.82, "ret_usd": -1.68}, {"sym": "AAL", "gap_pct": 2.86, "ret_pct": 0.126, "ret_usd": 0.26}, {"sym": "W", "gap_pct": 3.83, "ret_pct": 0.62, "ret_usd": 1.27}], "day_pl": -0.95, "day_ret_pct": -0.093, "capital": 1020.83}, {"day": "2026-06-22", "slot": 204.17, "n": 0, "picks": [], "day_pl": 0, "day_ret_pct": 0.0, "capital": 1020.83}, {"day": "2026-06-23", "slot": 204.17, "n": 3, "picks": [{"sym": "JNJ", "gap_pct": 1.88, "ret_pct": -0.127, "ret_usd": -0.26}, {"sym": "XOM", "gap_pct": 0.74, "ret_pct": -0.473, "ret_usd": -0.97}, {"sym": "TGT", "gap_pct": 1.66, "ret_pct": -0.434, "ret_usd": -0.89}], "day_pl": -2.12, "day_ret_pct": -0.208, "capital": 1018.71}, {"day": "2026-06-24", "slot": 203.74, "n": 3, "picks": [{"sym": "AAL", "gap_pct": 1.92, "ret_pct": 0.235, "ret_usd": 0.48}, {"sym": "NCLH", "gap_pct": 1.18, "ret_pct": -0.249, "ret_usd": -0.51}, {"sym": "UPST", "gap_pct": 0.83, "ret_pct": 0.808, "ret_usd": 1.65}], "day_pl": 1.62, "day_ret_pct": 0.159, "capital": 1020.33}]}}, "updated": "2026-06-26 23:55 MDT"}</script>
<script>
(function () {
  const data = JSON.parse(document.getElementById('dashboard-data').textContent);
  const SETUPS = data.setups || [];
  const money = (v) => (v == null) ? '—' : ((+v >= 0 ? '+$' : '-$') + Math.abs(+v).toFixed(2));
  const cls = (v) => (v == null || Math.abs(+v) < 0.005) ? 'flat' : (+v > 0 ? 'pos' : 'neg');
  const f2 = (v) => (v == null) ? '' : (+v).toFixed(2);
  const esc = (s) => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const CO = { up:'#69f0ae', dn:'#ef5350', stop:'#ff1744', entry:'#c77dff', target:'#00c853',
               selloff:'#ffc107', sma20:'#7c8aff', sma200:'#ffa726', grid:'#21262d', axis:'#556677' };
  document.getElementById('updated-at').textContent = data.updated || '—';
  document.getElementById('title').textContent = data.title || 'Opening Power — Multi-Strategy';
  document.getElementById('subtitle').textContent = data.subtitle || '';
  document.getElementById('limits').innerHTML =
    `<b>3-way comparison.</b> Each tab splits the day across ${SETUPS.length} apps: ${SETUPS.map(s=>esc(s.label)).join(' · ')}.
     Compounded $${data.capital}/${data.slots} slots, first-${data.slots}-by-arm, daily. Stocks &gt;$300 excluded. IBKR broad 231-name
     cache. ${data.timeframe_min>2?('<b>'+data.timeframe_min+'-min bars are resampled from 2-min</b> (approximate, not native ticks). '):''}In-sample/proxy — directional only.`;

  function chart(r) {
    const bars = (r.timeline||[]).filter(x=>x.o!=null);
    const W=1100,H=400,mL=58,mR=86,mT=14,mB=26, pw=W-mL-mR, ph=H-mT-mB, n=bars.length;
    if(!n) return '';
    let lo=Infinity,hi=-Infinity;
    bars.forEach(b=>{lo=Math.min(lo,b.l);hi=Math.max(hi,b.h);});
    [r.entry,r.stop,r.target].forEach(v=>{if(v!=null){lo=Math.min(lo,+v);hi=Math.max(hi,+v);}});
    bars.forEach(b=>{[b.sma20,b.sma200,b.stop].forEach(v=>{if(v!=null){lo=Math.min(lo,v);hi=Math.max(hi,v);}});});
    const pad=(hi-lo)*0.06||0.1; lo-=pad; hi+=pad;
    const xOf=i=>mL+pw*(i+0.5)/n, yOf=p=>mT+ph*(hi-p)/(hi-lo), cw=Math.max(2,pw/n*0.6);
    let s=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`;
    for(let k=0;k<=5;k++){const p=lo+(hi-lo)*k/5,y=yOf(p);
      s+=`<line x1="${mL}" y1="${y.toFixed(1)}" x2="${mL+pw}" y2="${y.toFixed(1)}" stroke="${CO.grid}"/>`;
      s+=`<text x="${mL-6}" y="${(y+3).toFixed(1)}" fill="${CO.axis}" font-size="11" text-anchor="end">${p.toFixed(2)}</text>`;}
    bars.forEach((b,i)=>{if(i%4===0||i===n-1)s+=`<text x="${xOf(i).toFixed(1)}" y="${H-8}" fill="${CO.axis}" font-size="10" text-anchor="middle">${b.t}</text>`;});
    const poly=(key,col)=>{const pts=bars.map((b,i)=>b[key]!=null?`${xOf(i).toFixed(1)},${yOf(b[key]).toFixed(1)}`:null).filter(Boolean).join(' ');
      return pts?`<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.6" opacity="0.9"/>`:'';};
    s+=poly('sma200',CO.sma200)+poly('sma20',CO.sma20);
    const hline=(p,col,dash,lbl)=>p==null?'':`<line x1="${mL}" y1="${yOf(p).toFixed(1)}" x2="${mL+pw}" y2="${yOf(p).toFixed(1)}" stroke="${col}" stroke-width="1.2" stroke-dasharray="${dash}"/><text x="${mL+pw+4}" y="${(yOf(p)+3).toFixed(1)}" fill="${col}" font-size="11">${lbl} ${(+p).toFixed(2)}</text>`;
    s+=hline(r.target,CO.target,'5 4','tgt')+hline(r.entry,CO.entry,'6 4','entry')+hline(r.stop,CO.stop,'2 3','stop');
    bars.forEach((b,i)=>{const x=xOf(i),up=b.c>=b.o,col=up?CO.up:CO.dn;
      s+=`<line x1="${x.toFixed(1)}" y1="${yOf(b.h).toFixed(1)}" x2="${x.toFixed(1)}" y2="${yOf(b.l).toFixed(1)}" stroke="${col}" stroke-width="1.1"/>`;
      const yo=yOf(b.o),yc=yOf(b.c);s+=`<rect x="${(x-cw/2).toFixed(1)}" y="${Math.min(yo,yc).toFixed(1)}" width="${cw.toFixed(1)}" height="${Math.max(1,Math.abs(yo-yc)).toFixed(1)}" fill="${col}"/>`;});
    bars.forEach((b,i)=>{const x=xOf(i);
      if(/ENTRY/.test(b.event||'')){const y=yOf(b.l)+12;s+=`<path d="M ${x-5} ${y} L ${x+5} ${y} L ${x} ${y-8} Z" fill="${CO.entry}"/>`;}
      if(/TARGET|STOP exit|SELL-OFF/.test(b.event||'')){const c2=/TARGET/.test(b.event)?CO.target:(/SELL-OFF/.test(b.event)?CO.selloff:CO.stop);
        s+=`<line x1="${x.toFixed(1)}" y1="${mT}" x2="${x.toFixed(1)}" y2="${mT+ph}" stroke="${c2}" stroke-width="1" stroke-dasharray="4 3"/>`;}});
    return s+`</svg>`;
  }

  function card(r) {
    const ex=r.exit||{}, hasT=r.target!=null;
    const tape=(r.timeline||[]).map(x=>{let e=x.event||'',rc='';
      if(/TARGET|STOP exit|SELL-OFF|STOP/.test(e))rc='r-exit';else if(/ENTRY|ADD/.test(e))rc='r-entry';else if(/trail|breakeven|push|\+1R|ARMED/.test(e))rc='r-stopmove';
      return `<tr class="${rc}"><td class="num">${x.t}</td><td class="num">${f2(x.o)}</td><td class="num">${f2(x.h)}</td><td class="num">${f2(x.l)}</td><td class="num">${f2(x.c)}</td>
        <td class="num">${x.stop!=null?'$'+f2(x.stop):''}</td><td class="num">${x.shares||''}</td><td class="ev">${esc(e)}</td></tr>`;}).join('');
    const plpct=(r.position_cost)?(r.realized_pl/r.position_cost*100):null;
    return `<div class="card"><h2>${r.symbol} <span class="pill">gap ${r.premarket_gap_pct>0?'+':''}${r.premarket_gap_pct}% · armed ${r.arm_t} · ${esc(r.loc)}</span></h2>
      <div class="funded">${r.shares}sh @ $${f2(r.entry)} (placed $${f2(r.position_cost)}) · stop $${f2(r.stop)} (${r.risk_pct}%)${hasT?` · tgt $${f2(r.target)} (3R)`:` · trail`} ·
        exit $${f2(ex.price)} @ ${ex.time||''} → <b class="${cls(r.realized_pl)}">${money(r.realized_pl)}</b> (${plpct!=null?(plpct>=0?'+':'')+plpct.toFixed(2)+'%':''})</div>
      <div class="legend"><span><span class="swatch" style="background:#7c8aff"></span>SMA20</span><span><span class="swatch" style="background:#ffa726"></span>SMA200</span>
        <span><span class="swatch" style="background:#c77dff"></span>entry</span><span><span class="swatch" style="background:#ff1744"></span>stop</span>${hasT?'<span><span class="swatch" style="background:#00c853"></span>3R</span>':''}</div>
      <div class="chart-wrap">${chart(r)}</div>
      <details><summary>2-min/5-min numbers</summary><table class="tape"><tr><th>T</th><th class="num">O</th><th class="num">H</th><th class="num">L</th><th class="num">C</th><th class="num">Stop</th><th class="num">Sh</th><th>Event</th></tr>${tape}</table></details></div>`;
  }

  function panelBody(p) {
    const t=p.totals;
    let h=`<div class="apptot ${cls(t.realized_pl)}">${money(t.realized_pl)} <span class="flat" style="font-size:0.78rem">(${t.avg_pct>=0?'+':''}${t.avg_pct}%/tr · ${t.names} tr)</span></div>`;
    h+= p.rows.length ? p.rows.map(card).join('') : '<div class="empty">no trades</div>';
    return h;
  }

  function splitGrid(inner){ return `<div class="split" style="grid-template-columns:repeat(${SETUPS.length},1fr)">${inner}</div>`; }

  function renderDay(d) {
    let stats = SETUPS.map(s=>{const t=d[s.key].totals;
      return `<div class="stat"><div class="value ${cls(t.realized_pl)}">${money(t.realized_pl)}</div><div class="label">${esc(s.label.replace(/^[^A-Za-z]+/,''))} (${t.avg_pct>=0?'+':''}${t.avg_pct}%/tr)</div></div>`;}).join('');
    stats += `<div class="stat"><div class="value" style="font-size:0.9rem">${esc(d.source||'')}</div><div class="label">${d.day}</div></div>`;
    const cols = SETUPS.map(s=>`<div class="appcol"><div class="apphdr ${s.klass}">${esc(s.label)}</div>${panelBody(d[s.key])}</div>`).join('');
    document.getElementById('day').innerHTML = `<div class="stat-row">${stats}</div>${splitGrid(cols)}`;
  }

  function renderSummary() {
    const c=data.compound;
    if(!c){document.getElementById('day').innerHTML='<div class="empty">no compound data</div>';return;}
    let stats = SETUPS.map(s=>{const x=c[s.key];
      return `<div class="stat"><div class="value ${cls(x.end-data.capital)}">$${x.end.toFixed(0)}</div><div class="label">${esc(s.label.replace(/^[^A-Za-z]+/,''))} (${x.total_pct>=0?'+':''}${x.total_pct}%)</div></div>`;}).join('');
    stats += `<div class="stat"><div class="value">$${data.capital.toFixed(0)}</div><div class="label">start · ${data.slots} slots · ${c[SETUPS[0].key].curve.length} days</div></div>`;
    const col=(s)=>{const x=c[s.key];
      let h=`<div class="apphdr ${s.klass}">${esc(s.label)}</div><div class="apptot ${cls(x.end-data.capital)}">$${x.start.toFixed(0)} → $${x.end.toFixed(2)} <span class="flat" style="font-size:0.78rem">(${x.total_pct>=0?'+':''}${x.total_pct}%)</span></div>`;
      h+=x.curve.map(r=>{const picks=(r.picks||[]).map(p=>`<tr><td class="sym">${p.sym}</td><td class="num ${cls(p.ret_pct)}">${p.ret_pct>=0?'+':''}${p.ret_pct}%</td><td class="num ${cls(p.ret_usd)}">${money(p.ret_usd)}</td></tr>`).join('')||'<tr><td colspan="3" class="empty">cash</td></tr>';
        return `<div class="card" style="padding:10px"><div class="funded"><b>${r.day}</b> · slot $${r.slot.toFixed(0)} × ${r.n} · <b class="${cls(r.day_pl)}">${money(r.day_pl)}</b> → $${r.capital.toFixed(2)}</div>
          <table class="tape"><tr><th>Stock</th><th class="num">Ret %</th><th class="num">Ret $</th></tr>${picks}</table></div>`;}).join('');
      return `<div class="appcol">${h}</div>`;};
    document.getElementById('day').innerHTML = `<div class="stat-row">${stats}</div>
      <div class="note" style="margin-bottom:10px">Daily-compounded: first ${data.slots} names to arm, equal slot (capital/${data.slots}); the day's P&L compounds forward. Per-stock Ret $ = slot × return%.</div>
      ${splitGrid(SETUPS.map(col).join(''))}`;
  }

  const tabs=document.getElementById('tabs');
  const setActive=el=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');};
  const sumTab=document.createElement('div');sumTab.className='tab active';sumTab.textContent='📈 Summary (compounded)';
  sumTab.onclick=()=>{setActive(sumTab);renderSummary();};tabs.appendChild(sumTab);
  data.days.forEach(d=>{const el=document.createElement('div');el.className='tab';el.textContent=d.day;
    el.onclick=()=>{setActive(el);renderDay(d);};tabs.appendChild(el);});
  renderSummary();
})();
</script>
</body>
</html>
