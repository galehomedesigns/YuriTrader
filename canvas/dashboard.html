<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Decades Developments — Dashboard</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root {
  --bg:#0d1117; --surface:#161b22; --surface-2:#1c222b; --border:#21262d;
  --text:#e6edf3; --text-dim:#8b95a7; --text-muted:#556677;
  --accent:#7c8aff; --accent-2:#c77dff;
  --ok:#00c853; --warn:#ffc107; --fail:#ff1744;
  --pnl-pos:#69f0ae; --pnl-neg:#ef5350;
  --radius:12px; --radius-sm:8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg); color:var(--text); padding:20px; line-height:1.5; }
.container { max-width:1200px; margin:0 auto; }
.dash-header { text-align:center; padding:30px 0 24px; border-bottom:1px solid var(--border); margin-bottom:32px; }
.dash-header h1 { font-size:28px; font-weight:700; }
.dash-header .subtitle { color:var(--text-dim); font-size:14px; margin-top:6px; }
.dash-header .updated { color:var(--text-muted); font-size:12px; margin-top:4px; }

.stat-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px, 1fr)); gap:16px; margin-bottom:32px; }
.stat { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; text-align:center; }
.stat .value { font-size:24px; font-weight:700; }
.stat .label { font-size:11px; color:var(--text-dim); margin-top:6px; text-transform:uppercase; letter-spacing:0.6px; }

.cards-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(420px, 1fr)); gap:20px; margin-bottom:24px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
.card h2 { font-size:16px; margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid var(--border); }

.chart-wrap { position:relative; height:260px; }

table { width:100%; border-collapse:collapse; font-size:13px; }
th { text-align:left; color:var(--text-dim); font-weight:600; padding:8px 10px; border-bottom:1px solid var(--border); text-transform:uppercase; letter-spacing:0.5px; font-size:11px; }
td { padding:8px 10px; border-bottom:1px solid #11161c; }

.todo { display:flex; gap:12px; align-items:flex-start; padding:8px 0; border-bottom:1px solid #11161c; font-size:13px; }
.todo:last-child { border-bottom:none; }
.todo.done { opacity:0.5; text-decoration:line-through; }
.todo .status-dot {
  width:14px; height:14px; border-radius:50%; flex-shrink:0; margin-top:4px;
  border:2px solid var(--text-dim);
}
.todo.pending    .status-dot { background:transparent; }
.todo.in_progress .status-dot { background:linear-gradient(to right, var(--accent) 50%, transparent 50%); border-color:var(--accent); }
.todo.done .status-dot { background:var(--ok); border-color:var(--ok); }
.todo .body { flex:1; }
.todo .meta { font-size:11px; color:var(--text-dim); margin-top:2px; }

.priority { display:inline-block; padding:1px 7px; border-radius:4px; font-size:10px; font-weight:700; letter-spacing:0.3px; }
.priority-high   { background:rgba(255,23,68,.15); color:var(--fail); }
.priority-medium { background:rgba(255,193,7,.15); color:var(--warn); }
.priority-low    { background:rgba(124,138,255,.15); color:var(--accent); }

.banner-warn {
  background: rgba(255,193,7,.08); border: 1px solid var(--warn);
  color: var(--warn); padding: 12px 16px; border-radius: var(--radius-sm);
  margin-bottom: 24px; font-size: 13px;
}

.empty { color:var(--text-muted); text-align:center; padding:30px 0; font-size:13px; font-style:italic; }
@media (max-width:768px) { .cards-grid { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="container">
  <header class="dash-header">
    <h1>Decades Developments</h1>
    <div class="subtitle">Personal dashboard &mdash; expenses, to-dos, priorities</div>
    <div class="updated">Last updated: <span id="updated-at">&mdash;</span></div>
  </header>

  <div id="banner-slot"></div>
  <div id="stats-row" class="stat-row"></div>

  <div class="cards-grid">
    <div class="card">
      <h2>Spending by Category</h2>
      <div class="chart-wrap"><canvas id="chart-categories"></canvas></div>
    </div>
    <div class="card">
      <h2>Recent Transactions</h2>
      <div id="transactions-body"></div>
    </div>
  </div>

  <div class="card">
    <h2>To-Do List</h2>
    <div id="todos-body"></div>
  </div>
</div>

<script id="dashboard-data" type="application/json">{"generated_at": "2026-06-08T10:00:03.370624+00:00", "warning": null, "summary": {"total_expenses": 28842.01, "receipt_count": 243, "active_todos": 11, "high_priority": 9}, "by_category": {"Meals & Entertainment": 5341.68, "Travel": 6030.69, "Software & Subscriptions": 892.5, "Other": 12693.15, "Advertising": 66.67, "Office Supplies": 152.09, "Vehicle Expenses": 926.72, "Bank & Financial": 3.0, "Computer & Software": 167.51, "Professional Fees": 2568.0}, "recent_expenses": [{"date": "2026-05-10", "vendor": "A&W", "amount": 14.75, "description": "Purchase of various food and drink items including coffee, a turnover, and a bacon & egger."}, {"date": "2026-05-09", "vendor": "MR. BARBER", "amount": 37.8, "description": "Haircut service"}, {"date": "2026-04-05", "vendor": "Ricky\u2019s All Day Grill", "amount": 116.14, "description": "Breakfast Meals"}, {"date": "2026-04-01", "vendor": "McDonald's", "amount": 9.25, "description": "Bacon Egg McMuffin, Hash Brown, Coffee, Blueberry Pie"}, {"date": "2026-03-30", "vendor": "McDonald's", "amount": 10.0, "description": "Bacon Egg McMuffin, Hash Brown, M Coffee (Black), Blueberry Muffin"}, {"date": "2026-03-22", "vendor": "SSP Canada (YYZ Pearson)", "amount": 4.72, "description": "Airport Snack/Beverage"}, {"date": "2026-03-21", "vendor": "A&W", "amount": 44.48, "description": "Business Lunch"}, {"date": "2026-03-21", "vendor": "A&W #1580 (Fort Sask)", "amount": 15.08, "description": "Business Meal"}], "todos": [{"id": 1, "text": "\ud83e\udd1d NETWORKING: BCCA AGM & Networking Breakfast (Vancouver Convention Centre)", "priority": "high", "status": "pending", "due": "2026-04-15"}, {"id": 2, "text": "\ud83e\udd1d NETWORKING: BCCA Island Golf Tournament (Victoria, BC)", "priority": "high", "status": "pending", "due": "2026-05-12"}, {"id": 3, "text": "\ud83e\udd1d NETWORKING: EGBC Industrial Seminar (Virtual)", "priority": "medium", "status": "pending", "due": "2026-04-28"}, {"id": 4, "text": "\ud83e\udd1d NETWORKING: EGBC Northern Branch Mixer (Prince George, BC)", "priority": "high", "status": "pending", "due": "2026-05-05"}, {"id": 5, "text": "\ud83e\udd1d NETWORKING: CCA National Construction Conference (Halifax, NS)", "priority": "high", "status": "pending", "due": "2026-09-15"}, {"id": 6, "text": "\ud83e\udd1d NETWORKING: CCA Advisory Council Summit (Ottawa, ON)", "priority": "medium", "status": "pending", "due": "2026-06-10"}, {"id": 7, "text": "\ud83e\udd1d NETWORKING: CCA Tech & Innovation Webinar (Virtual)", "priority": "high", "status": "pending", "due": "2026-05-20"}, {"id": 8, "text": "\ud83e\udd1d NETWORKING: Annual Chair's Industry Banquet (JW Marriott ICE District, Edmonton)", "priority": "high", "status": "pending", "due": "May 22, 2026"}, {"id": 9, "text": "\ud83e\udd1d NETWORKING: ECA Builders' Golf Classic (The Quarry, Edmonton)", "priority": "high", "status": "pending", "due": "June 18, 2026"}, {"id": 10, "text": "\ud83e\udd1d NETWORKING: APEGA Nexus - Engineering & Tech Summit (BMO Centre, Calgary)", "priority": "high", "status": "pending", "due": "May 14, 2026"}, {"id": 11, "text": "\ud83e\udd1d NETWORKING: Energy Industry Outlook Symposium (Telus Convention Centre, Calgary)", "priority": "high", "status": "pending", "due": "September 10, 2026"}]}</script>
<script>
(function () {
  const data = JSON.parse(document.getElementById('dashboard-data').textContent);
  const cssVar = (n) => getComputedStyle(document.documentElement).getPropertyValue(n).trim();
  const money = (n, d) => (n === null || n === undefined) ? '—' : '$' + Number(n).toFixed(d ?? 2);
  const fmtTime = (iso) => iso ? new Date(iso).toLocaleString() : '—';
  const fmtDate = (iso) => iso ? new Date(iso).toLocaleDateString() : '—';
  const esc = (s) => (s ?? '').toString().replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

  document.getElementById('updated-at').textContent = fmtTime(data.generated_at);

  if (data.warning) {
    document.getElementById('banner-slot').innerHTML =
      `<div class="banner-warn"><strong>Heads up:</strong> ${esc(data.warning)}</div>`;
  }

  const s = data.summary || {};
  const statCards = [
    { label: 'Total Expenses (YTD)', value: money(s.total_expenses) },
    { label: 'Receipts on File', value: s.receipt_count ?? 0 },
    { label: 'Active To-dos', value: s.active_todos ?? 0 },
    { label: 'High Priority', value: s.high_priority ?? 0 },
  ];
  document.getElementById('stats-row').innerHTML = statCards.map(c =>
    `<div class="stat"><div class="value">${c.value}</div><div class="label">${c.label}</div></div>`
  ).join('');

  // Spending by category chart
  const cats = data.by_category || {};
  const catLabels = Object.keys(cats);
  const catValues = Object.values(cats).map(v => Number(v) || 0);
  const canvas = document.getElementById('chart-categories');
  if (catLabels.length) {
    const palette = [cssVar('--accent'), cssVar('--accent-2'), cssVar('--pnl-pos'),
                     cssVar('--warn'), cssVar('--fail'), cssVar('--ok'), '#4fc3f7', '#ce93d8'];
    Chart.defaults.color = cssVar('--text-dim') || '#8b95a7';
    Chart.defaults.borderColor = cssVar('--border') || '#21262d';
    new Chart(canvas, {
      type: 'doughnut',
      data: {
        labels: catLabels,
        datasets: [{
          data: catValues,
          backgroundColor: catLabels.map((_, i) => palette[i % palette.length]),
          borderColor: cssVar('--surface') || '#161b22',
          borderWidth: 2,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { position: 'right', labels: { padding: 12 } },
          tooltip: { callbacks: { label: c => `${c.label}: $${c.parsed.toFixed(2)}` } },
        },
      },
    });
  } else {
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = cssVar('--text-muted') || '#556677';
    ctx.font = '13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('No expense category data yet.', canvas.width / 2, canvas.height / 2);
  }

  // Recent transactions
  const txs = data.recent_expenses || [];
  const txBody = document.getElementById('transactions-body');
  if (!txs.length) {
    txBody.innerHTML = '<div class="empty">No recent transactions.</div>';
  } else {
    txBody.innerHTML = `<table><thead><tr><th>Date</th><th>Vendor</th><th>Amount</th></tr></thead>
      <tbody>${txs.map(t => `<tr>
        <td>${fmtDate(t.date)}</td>
        <td>${esc(t.vendor)}<div style="color:var(--text-dim);font-size:11px">${esc(t.description || '')}</div></td>
        <td style="text-align:right;font-family:ui-monospace,Menlo,monospace">${money(t.amount)}</td>
      </tr>`).join('')}</tbody></table>`;
  }

  // Todos
  const todos = data.todos || [];
  const todosBody = document.getElementById('todos-body');
  if (!todos.length) {
    todosBody.innerHTML = '<div class="empty">Nothing on the list. Enjoy.</div>';
  } else {
    // Sort: active first, then by priority (high→low), then by due
    const order = { high: 0, medium: 1, low: 2 };
    const sorted = [...todos].sort((a, b) => {
      if ((a.status === 'done') !== (b.status === 'done')) return a.status === 'done' ? 1 : -1;
      return (order[a.priority] ?? 3) - (order[b.priority] ?? 3);
    });
    todosBody.innerHTML = sorted.map(t => `
      <div class="todo ${t.status || 'pending'} ${t.status === 'done' ? 'done' : ''}">
        <div class="status-dot"></div>
        <div class="body">
          <div>${esc(t.text)} <span class="priority priority-${t.priority || 'low'}">${(t.priority || 'low').toUpperCase()}</span></div>
          <div class="meta">${t.due ? 'Due ' + fmtDate(t.due) : ''}${t.status ? ' · ' + esc(t.status) : ''}</div>
        </div>
      </div>`).join('');
  }
})();
</script>
</body>
</html>
