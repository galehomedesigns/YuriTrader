<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface-2: #1c222b;
  --border: #21262d;
  --text: #e6edf3;
  --text-dim: #8b95a7;
  --text-muted: #556677;
  --accent: #7c8aff;
  --accent-2: #c77dff;
  --ok: #00c853;
  --warn: #ffc107;
  --fail: #ff1744;
  --pnl-pos: #69f0ae;
  --pnl-neg: #ef5350;
  --radius: 12px;
  --radius-sm: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 20px;
  line-height: 1.5;
}
.container { max-width: 1200px; margin: 0 auto; }
.dash-header {
  text-align: center;
  padding: 30px 0 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
}
.dash-header h1 { font-size: 28px; font-weight: 700; color: var(--text); }
.dash-header .subtitle { color: var(--text-dim); font-size: 14px; margin-top: 6px; }
.dash-header .updated { color: var(--text-muted); font-size: 12px; margin-top: 4px; }

.stat-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}
.stat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  text-align: center;
}
.stat .value { font-size: 24px; font-weight: 700; color: var(--text); }
.stat .label {
  font-size: 11px; color: var(--text-dim); margin-top: 6px;
  text-transform: uppercase; letter-spacing: 0.6px;
}
.stat.pos .value { color: var(--pnl-pos); }
.stat.neg .value { color: var(--pnl-neg); }

h2 {
  font-size: 16px;
  color: var(--text);
  margin: 8px 0 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

.bots-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}
.bot-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.bot-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 14px;
}
.bot-name { font-size: 15px; font-weight: 700; color: var(--text); }
.bot-rank { font-size: 12px; color: var(--text-dim); }
.bot-stats { display: flex; gap: 22px; margin-bottom: 14px; }
.stat-pair .label {
  font-size: 10px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 0.6px;
}
.stat-pair .value { font-size: 15px; font-weight: 600; color: var(--text); }
.chart-wrap { position: relative; height: 160px; }

.pnl-pos { color: var(--pnl-pos); }
.pnl-neg { color: var(--pnl-neg); }

.defs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
  gap: 20px;
}
.def-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
}
.def-card h3 { font-size: 14px; color: var(--text); margin-bottom: 8px; font-weight: 700; }
.def-card .desc { color: var(--text-dim); font-size: 13px; margin-bottom: 10px; }
.def-card .rule { margin-top: 10px; font-size: 13px; }
.def-card .rule-label {
  color: var(--accent); text-transform: uppercase;
  font-size: 10px; letter-spacing: 0.6px; font-weight: 700;
}
.def-card .rule-body { color: var(--text); margin-top: 2px; }

.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.badge-ok { background: rgba(0,200,83,.15); color: var(--ok); }
.badge-warn { background: rgba(255,193,7,.15); color: var(--warn); }
.badge-fail { background: rgba(255,23,68,.15); color: var(--fail); }

.empty { color: var(--text-muted); text-align: center; padding: 40px; font-size: 14px; }
@media (max-width: 768px) {
  .bots-grid, .defs-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<script>
(function () {
  const raw = document.getElementById('dashboard-data').textContent;
  const data = JSON.parse(raw);

  const cssVar = (name) => getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  const fmt = (n, d) => (n === null || n === undefined || Number.isNaN(Number(n))) ? '—' : Number(n).toFixed(d ?? 2);
  const fmtPnl = (n) => {
    if (n === null || n === undefined) return '—';
    const v = Number(n);
    const sign = v >= 0 ? '+' : '';
    return `${sign}$${v.toFixed(2)}`;
  };
  const pnlClass = (n) => (Number(n) >= 0 ? 'pnl-pos' : 'pnl-neg');

  // Header timestamp
  document.getElementById('updated-at').textContent =
    data.generated_at ? new Date(data.generated_at).toLocaleString() : '—';

  // Summary stats row
  const s = data.summary || {};
  const statCards = [
    { label: 'Total Trades', value: s.total_trades ?? 0 },
    { label: 'Overall Win Rate', value: `${fmt(s.overall_win_rate, 1)}%` },
    { label: 'Total P&L', value: fmtPnl(s.total_pnl), cls: Number(s.total_pnl) >= 0 ? 'pos' : 'neg' },
    { label: 'Best Bot', value: s.best_bot || '—' },
    { label: 'Active Bots', value: `${s.active_bots ?? 0} / ${s.total_bots ?? 0}` },
    { label: 'Open Positions', value: s.open_positions ?? 0 },
  ];
  document.getElementById('stats-row').innerHTML = statCards.map(c =>
    `<div class="stat ${c.cls || ''}"><div class="value">${c.value}</div><div class="label">${c.label}</div></div>`
  ).join('');

  // Per-bot cards
  const bots = data.bots || [];
  const botsGrid = document.getElementById('bots-grid');
  if (!bots.length) {
    botsGrid.innerHTML = '<div class="empty">No bot data yet.</div>';
  } else {
    botsGrid.innerHTML = bots.map((b, i) => `
      <div class="bot-card">
        <div class="bot-header">
          <div class="bot-name">${b.bot_name}</div>
          <div class="bot-rank">#${i + 1}</div>
        </div>
        <div class="bot-stats">
          <div class="stat-pair"><div class="label">P&amp;L</div>
               <div class="value ${pnlClass(b.total_pnl)}">${fmtPnl(b.total_pnl)}</div></div>
          <div class="stat-pair"><div class="label">Win rate</div>
               <div class="value">${fmt(b.win_rate, 1)}%</div></div>
          <div class="stat-pair"><div class="label">Trades</div>
               <div class="value">${b.total_trades}</div></div>
        </div>
        <div class="chart-wrap"><canvas id="chart-${b.bot_id}"></canvas></div>
      </div>
    `).join('');

    Chart.defaults.color = cssVar('--text-dim') || '#8b95a7';
    Chart.defaults.borderColor = cssVar('--border') || '#21262d';

    for (const b of bots) {
      const series = b.pnl_series || [];
      const labels = series.map(p => new Date(p.t).toLocaleDateString());
      const values = series.map(p => p.v);
      const posColor = cssVar('--pnl-pos') || '#69f0ae';
      const negColor = cssVar('--pnl-neg') || '#ef5350';
      const color = Number(b.total_pnl) >= 0 ? posColor : negColor;
      const canvas = document.getElementById('chart-' + b.bot_id);
      if (!canvas) continue;
      if (!series.length) {
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = cssVar('--text-muted') || '#556677';
        ctx.font = '13px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('No closed trades yet.', canvas.width / 2, canvas.height / 2);
        continue;
      }
      new Chart(canvas, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data: values,
            borderColor: color,
            backgroundColor: color + '22',
            borderWidth: 2,
            tension: 0.25,
            pointRadius: series.length < 20 ? 2 : 0,
            fill: true,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: {
            label: (c) => '$' + c.parsed.y.toFixed(2),
          } } },
          scales: {
            x: { ticks: { maxTicksLimit: 5, autoSkip: true } },
            y: { beginAtZero: false, ticks: { callback: v => '$' + Number(v).toFixed(0) } },
          },
        },
      });
    }
  }

  // Strategy definition cards
  const defs = data.definitions || [];
  const defsGrid = document.getElementById('defs-grid');
  if (!defs.length) {
    defsGrid.innerHTML = '<div class="empty">No strategy definitions loaded.</div>';
  } else {
    defsGrid.innerHTML = defs.map(d => {
      const rules = (d.rules || []).map(r =>
        `<div class="rule">
           <div class="rule-label">${r.label}</div>
           <div class="rule-body">${r.body}</div>
         </div>`
      ).join('');
      return `
        <div class="def-card">
          <h3>${d.bot_name}</h3>
          <div class="desc">${d.description || ''}</div>
          ${rules}
        </div>`;
    }).join('');
  }
})();
</script>
