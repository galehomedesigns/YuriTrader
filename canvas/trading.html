<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Intelligence</title>
<style>
:root {
  --bg:#0d1117; --surface:#161b22; --surface-2:#1c222b; --border:#21262d;
  --text:#e6edf3; --text-dim:#8b95a7; --text-muted:#556677;
  --accent:#7c8aff; --accent-2:#c77dff;
  --ok:#00c853; --warn:#ffc107; --fail:#ff1744;
  --pnl-pos:#69f0ae; --pnl-neg:#ef5350;
  --radius:12px; --radius-sm:8px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg); color:var(--text); padding:20px; line-height:1.5; }
.container { max-width:1200px; margin:0 auto; }
.dash-header { text-align:center; padding:30px 0 24px; border-bottom:1px solid var(--border); margin-bottom:32px; }
.dash-header h1 { font-size:28px; font-weight:700; }
.dash-header .subtitle { color:var(--text-dim); font-size:14px; margin-top:6px; }
.dash-header .updated { color:var(--text-muted); font-size:12px; margin-top:4px; }

.stat-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px, 1fr)); gap:16px; margin-bottom:32px; }
.stat { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; text-align:center; }
.stat .value { font-size:24px; font-weight:700; }
.stat .label { font-size:11px; color:var(--text-dim); margin-top:6px; text-transform:uppercase; letter-spacing:0.6px; }
.stat.pos .value { color:var(--pnl-pos); }
.stat.neg .value { color:var(--pnl-neg); }
.stat.ok  .value { color:var(--ok); }
.stat.fail .value { color:var(--fail); }
.stat.warn .value { color:var(--warn); }

h2 { font-size:16px; margin:8px 0 16px; padding-bottom:10px; border-bottom:1px solid var(--border); }

.cards-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(420px, 1fr)); gap:20px; margin-bottom:24px; }
.card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; }
.card-title { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px; border-bottom:1px solid var(--border); padding-bottom:10px; }
.card-title h2 { border:none; padding:0; margin:0; }
.card-count { color:var(--text-dim); font-size:12px; font-weight:400; }

table { width:100%; border-collapse:collapse; font-size:13px; }
th { text-align:left; color:var(--text-dim); font-weight:600; padding:8px 10px; border-bottom:1px solid var(--border); text-transform:uppercase; letter-spacing:0.5px; font-size:11px; }
td { padding:8px 10px; border-bottom:1px solid #11161c; font-family:ui-monospace,Menlo,monospace; }
td.sym { font-weight:700; font-family:inherit; }
.pnl-pos { color:var(--pnl-pos); font-weight:600; }
.pnl-neg { color:var(--pnl-neg); font-weight:600; }

.badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; letter-spacing:0.3px; }
.badge-ok { background:rgba(0,200,83,.15); color:var(--ok); }
.badge-warn { background:rgba(255,193,7,.15); color:var(--warn); }
.badge-fail { background:rgba(255,23,68,.15); color:var(--fail); }
.badge-muted { background:rgba(85,102,119,.18); color:var(--text-dim); }
.badge-bull { background:rgba(0,200,83,.15); color:var(--ok); }
.badge-bear { background:rgba(255,23,68,.15); color:var(--fail); }
.badge-neutral { background:rgba(255,193,7,.15); color:var(--warn); }

.feed-item { padding:10px 0; border-bottom:1px solid #11161c; font-size:13px; }
.feed-item:last-child { border-bottom:none; }
.feed-item a { color:var(--accent); text-decoration:none; }
.feed-item a:hover { text-decoration:underline; }
.feed-item .meta { color:var(--text-muted); font-size:11px; margin-top:3px; }

.empty { color:var(--text-muted); text-align:center; padding:30px 0; font-size:13px; font-style:italic; }
.watchlist-chips { display:flex; flex-wrap:wrap; gap:8px; }
.chip { background:var(--surface-2); border:1px solid var(--border); border-radius:6px; padding:4px 10px; font-size:12px; font-family:ui-monospace,Menlo,monospace; }

@media (max-width:768px) { .stat-row { grid-template-columns:repeat(2, 1fr); } .cards-grid { grid-template-columns:1fr; } }
</style>
</head>
<body>
<div class="container">
  <header class="dash-header">
    <h1>Trading Intelligence</h1>
    <div class="subtitle">Live market snapshots, alerts, auto-trade status, news &amp; sentiment</div>
    <div class="updated">Last updated: <span id="updated-at">&mdash;</span></div>
  </header>

  <div id="stats-row" class="stat-row"></div>

  <div class="cards-grid">
    <div class="card">
      <div class="card-title"><h2>Market Positions</h2><span id="positions-count" class="card-count">(0)</span></div>
      <div id="positions-body"></div>
    </div>
    <div class="card">
      <div class="card-title"><h2>Price Alerts</h2><span id="alerts-count" class="card-count">(0)</span></div>
      <div id="alerts-body"></div>
    </div>
  </div>

  <div class="cards-grid">
    <div class="card">
      <div class="card-title"><h2>Signal Changes</h2><span id="signal-count" class="card-count">(0)</span></div>
      <div id="signals-body"></div>
    </div>
    <div class="card">
      <div class="card-title"><h2>Watchlist</h2><span id="watchlist-count" class="card-count">(0)</span></div>
      <div id="watchlist-body"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><h2>Auto-Trade Positions</h2><span id="auto-open-count" class="card-count">(0)</span></div>
    <div id="auto-open-body"></div>
  </div>

  <div class="card">
    <div class="card-title"><h2>Recent Auto-Trades</h2><span id="auto-closed-count" class="card-count">(0)</span></div>
    <div id="auto-closed-body"></div>
  </div>

  <div class="cards-grid">
    <div class="card">
      <div class="card-title"><h2>Financial News</h2><span id="news-count" class="card-count">(0)</span></div>
      <div id="news-body"></div>
    </div>
    <div class="card">
      <div class="card-title"><h2>Social &amp; Political Signals</h2><span id="social-count" class="card-count">(0)</span></div>
      <div id="social-body"></div>
    </div>
  </div>
</div>

<script>
(function () {
  const data = JSON.parse(document.getElementById('dashboard-data').textContent);

  const fmtPct = (n) => (n === null || n === undefined || Number.isNaN(Number(n))) ? '—' : `${Number(n) >= 0 ? '+' : ''}${Number(n).toFixed(2)}%`;
  const fmt$ = (n, d) => (n === null || n === undefined || Number.isNaN(Number(n))) ? '—' : '$' + Number(n).toFixed(d ?? 2);
  const fmtMoney = (n, d) => {
    if (n === null || n === undefined || Number.isNaN(Number(n))) return '—';
    const v = Number(n); return (v >= 0 ? '+' : '-') + '$' + Math.abs(v).toFixed(d ?? 2);
  };
  const fmtInt = (n) => (n === null || n === undefined) ? '—' : Number(n).toLocaleString();
  const pctClass = (n) => Number(n) > 0 ? 'pnl-pos' : Number(n) < 0 ? 'pnl-neg' : '';
  const fmtTime = (iso) => iso ? new Date(iso).toLocaleString() : '—';
  const fmtDate = (iso) => iso ? new Date(iso).toLocaleDateString() : '—';
  const esc = (s) => (s ?? '').toString().replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

  const signalBadge = (sig) => {
    if (!sig) return '';
    const cls = sig === 'BULLISH' ? 'badge-bull' : sig === 'BEARISH' ? 'badge-bear' : 'badge-neutral';
    return `<span class="badge ${cls}">${sig}</span>`;
  };
  const impactBadge = (level) => {
    if (!level) return '';
    const cls = level === 'HIGH' ? 'badge-fail' : level === 'MEDIUM' ? 'badge-warn' : 'badge-muted';
    return `<span class="badge ${cls}">${level}</span>`;
  };

  document.getElementById('updated-at').textContent = fmtTime(data.generated_at);

  // Summary stats
  const s = data.summary || {};
  const statCards = [
    { label: 'Watchlist', value: s.watchlist_count ?? 0 },
    { label: 'Live Signals', value: s.signal_count ?? 0 },
    { label: 'Active Alerts', value: s.active_alerts ?? 0 },
    { label: 'Open Auto-Trades', value: s.auto_open ?? 0 },
    { label: "Today's Auto-P&L", value: fmtMoney(s.auto_today_pnl), cls: Number(s.auto_today_pnl) >= 0 ? 'pos' : 'neg' },
    { label: 'Auto-Trading', value: s.auto_paused ? 'PAUSED' : 'ACTIVE', cls: s.auto_paused ? 'fail' : 'ok' },
  ];
  document.getElementById('stats-row').innerHTML = statCards.map(c =>
    `<div class="stat ${c.cls || ''}"><div class="value">${c.value}</div><div class="label">${c.label}</div></div>`
  ).join('');

  // Market positions
  const positions = data.positions || [];
  document.getElementById('positions-count').textContent = `(${positions.length})`;
  const positionsBody = document.getElementById('positions-body');
  if (!positions.length) {
    positionsBody.innerHTML = '<div class="empty">No market snapshots yet.</div>';
  } else {
    positionsBody.innerHTML = `<table><thead><tr><th>Symbol</th><th>Price</th><th>Chg %</th><th>Volume</th><th>Signal</th></tr></thead>
      <tbody>${positions.map(p => `<tr>
        <td class="sym">${esc(p.symbol)}</td>
        <td>${fmt$(p.price)}</td>
        <td class="${pctClass(p.day_change_pct)}">${fmtPct(p.day_change_pct)}</td>
        <td>${fmtInt(p.volume)}</td>
        <td>${signalBadge(p.signal)}</td>
      </tr>`).join('')}</tbody></table>`;
  }

  // Price alerts
  const alerts = data.alerts || [];
  document.getElementById('alerts-count').textContent = `(${alerts.length})`;
  const alertsBody = document.getElementById('alerts-body');
  if (!alerts.length) {
    alertsBody.innerHTML = '<div class="empty">No active alerts.</div>';
  } else {
    alertsBody.innerHTML = `<table><thead><tr><th>Symbol</th><th>Type</th><th>Threshold</th><th>Status</th></tr></thead>
      <tbody>${alerts.map(a => `<tr>
        <td class="sym">${esc(a.symbol)}</td>
        <td>${esc(a.alert_type)}</td>
        <td>${fmt$(a.threshold)}</td>
        <td>${a.triggered ? '<span class="badge badge-fail">TRIGGERED</span>' : '<span class="badge badge-ok">Active</span>'}</td>
      </tr>`).join('')}</tbody></table>`;
  }

  // Signal changes
  const signalChanges = data.signal_changes || [];
  document.getElementById('signal-count').textContent = `(${signalChanges.length})`;
  const signalsBody = document.getElementById('signals-body');
  if (!signalChanges.length) {
    signalsBody.innerHTML = '<div class="empty">No signal changes.</div>';
  } else {
    signalsBody.innerHTML = signalChanges.map(s => `
      <div class="feed-item">
        <span class="sym" style="font-weight:700">${esc(s.symbol)}</span>:
        ${signalBadge(s.previous_signal)} &rarr; ${signalBadge(s.signal)}
        <div class="meta">${fmtTime(s.computed_at)}</div>
      </div>`).join('');
  }

  // Watchlist
  const wl = data.watchlist || [];
  document.getElementById('watchlist-count').textContent = `(${wl.length})`;
  const wlBody = document.getElementById('watchlist-body');
  if (!wl.length) {
    wlBody.innerHTML = '<div class="empty">Watchlist is empty.</div>';
  } else {
    wlBody.innerHTML = `<div class="watchlist-chips">${wl.map(x => `<span class="chip">${esc(x)}</span>`).join('')}</div>`;
  }

  // Auto-trade open positions
  const autoOpen = data.auto_open || [];
  document.getElementById('auto-open-count').textContent = `(${autoOpen.length})`;
  const autoOpenBody = document.getElementById('auto-open-body');
  if (!autoOpen.length) {
    autoOpenBody.innerHTML = '<div class="empty">No open auto-trade positions.</div>';
  } else {
    autoOpenBody.innerHTML = `<table><thead><tr><th>Symbol</th><th>Side</th><th>Entry</th><th>Current</th><th>Return</th><th>Opened</th><th>Flags</th></tr></thead>
      <tbody>${autoOpen.map(p => `<tr>
        <td class="sym">${esc(p.symbol)}</td>
        <td>${esc(p.side)}</td>
        <td>${fmt$(p.entry_price)}</td>
        <td>${fmt$(p.current_price)}</td>
        <td class="${pctClass(p.unrealized_pct)}">${fmtPct(p.unrealized_pct)}</td>
        <td>${fmtDate(p.opened_at)}</td>
        <td style="font-size:11px;color:var(--text-dim)">${esc((p.buy_flags_met || []).slice(0, 3).join(', '))}</td>
      </tr>`).join('')}</tbody></table>`;
  }

  // Auto-trade closed
  const autoClosed = data.auto_closed || [];
  document.getElementById('auto-closed-count').textContent = `(${autoClosed.length})`;
  const autoClosedBody = document.getElementById('auto-closed-body');
  if (!autoClosed.length) {
    autoClosedBody.innerHTML = '<div class="empty">No recent auto-trades.</div>';
  } else {
    autoClosedBody.innerHTML = `<table><thead><tr><th>Closed</th><th>Symbol</th><th>Side</th><th>Entry</th><th>Exit</th><th>P&L</th></tr></thead>
      <tbody>${autoClosed.map(t => `<tr>
        <td>${fmtTime(t.closed_at)}</td>
        <td class="sym">${esc(t.symbol)}</td>
        <td>${esc(t.side)}</td>
        <td>${fmt$(t.entry_price)}</td>
        <td>${fmt$(t.exit_price)}</td>
        <td class="${Number(t.pnl) >= 0 ? 'pnl-pos' : 'pnl-neg'}">${fmtMoney(t.pnl)}</td>
      </tr>`).join('')}</tbody></table>`;
  }

  // Financial news
  const news = data.news || [];
  document.getElementById('news-count').textContent = `(${news.length})`;
  const newsBody = document.getElementById('news-body');
  if (!news.length) {
    newsBody.innerHTML = '<div class="empty">No news.</div>';
  } else {
    newsBody.innerHTML = news.map(n => `
      <div class="feed-item">
        <a href="${esc(n.url || '#')}" target="_blank" rel="noopener">${esc((n.title || '').slice(0, 120))}</a>
        ${impactBadge(n.impact_level)}
        <div class="meta">${esc(n.source || '')} &middot; ${fmtTime(n.published_at)}</div>
      </div>`).join('');
  }

  // Social signals
  const social = data.social || [];
  document.getElementById('social-count').textContent = `(${social.length})`;
  const socialBody = document.getElementById('social-body');
  if (!social.length) {
    socialBody.innerHTML = '<div class="empty">No social signals.</div>';
  } else {
    socialBody.innerHTML = social.map(s => `
      <div class="feed-item">
        <strong>${esc(s.author || '')}</strong> <span style="color:var(--text-dim);font-size:11px">(${esc(s.platform || '')})</span>
        ${impactBadge(s.severity)}
        <div style="margin-top:4px">${esc((s.content || '').slice(0, 180))}</div>
        <div class="meta">${fmtTime(s.fetched_at)}</div>
      </div>`).join('');
  }
})();
</script>
</body>
</html>
