<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Opening Power — Variant Sim (candles · SMAs · gap · location)</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --surface-2: #1c222b; --border: #21262d;
  --text: #e6edf3; --text-dim: #8b95a7; --text-muted: #556677;
  --accent: #7c8aff; --accent-2: #c77dff; --ok: #00c853; --warn: #ffc107;
  --fail: #ff1744; --pnl-pos: #69f0ae; --pnl-neg: #ef5350; --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg); color: var(--text); padding: 20px; line-height: 1.5; }
.container { max-width: 1180px; margin: 0 auto; }
.dash-header { margin-bottom: 12px; }
.dash-header h1 { font-size: 1.5rem; }
.subtitle { color: var(--text-dim); font-size: 0.9rem; }
.updated { color: var(--text-muted); font-size: 0.8rem; margin-top: 4px; }
.banner { padding: 10px 14px; border-radius: var(--radius); margin: 12px 0; font-size: 0.88rem; }
.banner-warn { background: rgba(255,193,7,0.12); border: 1px solid var(--warn); }
.tabs { display: flex; gap: 6px; flex-wrap: wrap; margin: 14px 0 6px; border-bottom: 1px solid var(--border); }
.tab { padding: 8px 16px; cursor: pointer; color: var(--text-dim); border: 1px solid var(--border);
  border-bottom: none; border-radius: 8px 8px 0 0; background: var(--surface); font-size: 0.86rem; }
.tab.active { color: var(--text); background: var(--surface-2); border-color: var(--accent); font-weight: 600; }
.stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 12px; margin: 14px 0; }
.stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.stat .value { font-size: 1.5rem; font-weight: 600; }
.stat .label { color: var(--text-dim); font-size: 0.78rem; text-transform: uppercase; letter-spacing: .04em; }
.pos { color: var(--pnl-pos); } .neg { color: var(--pnl-neg); } .flat { color: var(--text-dim); }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin: 14px 0; }
.card h2 { font-size: 1.05rem; margin-bottom: 4px; }
.card h2 .pill { font-size: 0.72rem; color: var(--text-dim); font-weight: 400; }
table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
th, td { text-align: left; padding: 5px 8px; border-bottom: 1px solid var(--border); }
th { color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 0.68rem; }
td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
.sym { font-weight: 600; }
.badge { padding: 2px 8px; border-radius: 6px; font-size: 0.72rem; white-space: nowrap; }
.badge-ok { background: rgba(0,200,83,0.15); color: var(--pnl-pos); }
.badge-warn { background: rgba(255,193,7,0.15); color: var(--warn); }
.badge-fail { background: rgba(255,23,68,0.15); color: var(--pnl-neg); }
.badge-muted { background: var(--surface-2); color: var(--text-dim); }
.win { background: rgba(124,138,255,0.10); }
.empty { color: var(--text-muted); padding: 10px; font-style: italic; }
.note { color: var(--text-muted); font-size: 0.78rem; margin-top: 8px; }
.note b { color: var(--text-dim); }
.funded { color: var(--text-dim); font-size: 0.82rem; margin: 4px 0 8px; }
.funded b { color: var(--text); }
.legend { font-size: 0.73rem; color: var(--text-dim); margin: 6px 0; display: flex; gap: 14px; flex-wrap: wrap; }
.legend span { display: inline-flex; align-items: center; gap: 5px; }
.swatch { width: 14px; height: 3px; display: inline-block; border-radius: 2px; }
.chart-wrap { width: 100%; overflow-x: auto; }
svg { display: block; width: 100%; height: auto; }
details { margin-top: 10px; } summary { cursor: pointer; color: var(--text-dim); font-size: 0.82rem; }
.tape { font-size: 0.74rem; margin-top: 8px; } .tape td, .tape th { padding: 3px 6px; }
.tape td.ev { color: var(--text-dim); }
tr.r-entry { background: rgba(199,125,255,0.14); } tr.r-stopmove { background: rgba(255,193,7,0.10); }
tr.r-exit { background: rgba(255,23,68,0.15); } tr.r-flat td { color: var(--text-muted); }
.state { font-size: 0.66rem; padding: 1px 5px; border-radius: 5px; background: var(--surface-2); color: var(--text-dim); }
.split { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: start; }
@media (max-width: 900px) { .split { grid-template-columns: 1fr; } }
.appcol { min-width: 0; }
.apphdr { padding: 8px 12px; border-radius: 8px; font-weight: 600; font-size: 0.86rem; margin-bottom: 8px; }
.apphdr.base { background: rgba(255,193,7,0.10); border: 1px solid var(--warn); color: var(--warn); }
.apphdr.sweet { background: rgba(0,200,83,0.10); border: 1px solid var(--ok); color: var(--pnl-pos); }
.apptot { font-size: 1.15rem; font-weight: 600; margin: 4px 0 10px; }
.appcol .card { padding: 12px; }
.appcol .card h2 { font-size: 0.92rem; }
</style>
</head>
<body>
<div class="container">
  <header class="dash-header">
    <h1>Opening Power — Variant Simulation</h1>
    <div class="subtitle" id="rules"></div>
    <div class="updated">Generated: <span id="updated-at">&mdash;</span></div>
  </header>
  <div class="banner banner-warn" id="limits"></div>
  <div class="tabs" id="tabs"></div>
  <div id="day"></div>
</div>

<script id="dashboard-data" type="application/json">{{DATA}}</script>
<script>
(function () {
  const data = JSON.parse(document.getElementById('dashboard-data').textContent);
  const money = (v) => (v == null) ? '—' : ((+v >= 0 ? '+$' : '-$') + Math.abs(+v).toFixed(2));
  const cls = (v) => (v == null || Math.abs(+v) < 0.005) ? 'flat' : (+v > 0 ? 'pos' : 'neg');
  const f2 = (v) => (v == null) ? '' : (+v).toFixed(2);
  const esc = (s) => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const CO = { up:'#69f0ae', dn:'#ef5350', stop:'#ff1744', entry:'#c77dff', target:'#00c853',
               selloff:'#ffc107', sma20:'#7c8aff', sma200:'#ffa726', grid:'#21262d', axis:'#556677' };
  document.getElementById('updated-at').textContent = data.updated || '—';
  document.getElementById('rules').innerHTML = 'Rule set: <b>' + esc((data.config||{}).rules) + '</b>';
  document.getElementById('limits').innerHTML =
    `<b>SWEET-SPOT config</b> — ${esc((data.config||{}).rules || '')}.
     Found by a parameter sweep over these days; on the full 231-name universe over 60 days it does <b>+0.079%/trade
     (+223%)</b> vs the live baseline's +0.061% (+59%) and the first variant's −0.022% (−52%). Each tab shows
     <b>sweet-spot vs baseline head-to-head</b> for that day (totals over all gap-0.5–4% candidates; charts show the
     top by P&L). 6/26 = live TradingView feed; prior days = IBKR broad cache. Grid-searched → the exact figure is
     optimistic, but the pattern (loose wick stops · let winners run to 3R · modest gaps) is robust.`;

  function chart(r) {
    const bars = (r.timeline||[]).filter(x=>x.o!=null);
    const W=1100,H=400,mL=58,mR=86,mT=14,mB=26, pw=W-mL-mR, ph=H-mT-mB, n=bars.length;
    let lo=Infinity,hi=-Infinity;
    bars.forEach(b=>{lo=Math.min(lo,b.l);hi=Math.max(hi,b.h);});
    [r.entry,r.stop,r.target].forEach(v=>{if(v!=null){lo=Math.min(lo,+v);hi=Math.max(hi,+v);}});
    bars.forEach(b=>{[b.sma20,b.sma200,b.stop].forEach(v=>{if(v!=null){lo=Math.min(lo,v);hi=Math.max(hi,v);}});});
    const pad=(hi-lo)*0.06||0.1; lo-=pad; hi+=pad;
    const xOf=i=>mL+pw*(i+0.5)/n, yOf=p=>mT+ph*(hi-p)/(hi-lo), cw=Math.max(2,pw/n*0.6);
    let s=`<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`;
    for(let k=0;k<=5;k++){const p=lo+(hi-lo)*k/5,y=yOf(p);
      s+=`<line x1="${mL}" y1="${y.toFixed(1)}" x2="${mL+pw}" y2="${y.toFixed(1)}" stroke="${CO.grid}"/>`;
      s+=`<text x="${mL-6}" y="${(y+3).toFixed(1)}" fill="${CO.axis}" font-size="11" text-anchor="end">${p.toFixed(2)}</text>`;}
    bars.forEach((b,i)=>{if(i%5===0||i===n-1)s+=`<text x="${xOf(i).toFixed(1)}" y="${H-8}" fill="${CO.axis}" font-size="10" text-anchor="middle">${b.t}</text>`;});
    // SMA polylines
    const poly=(key,col)=>{const pts=bars.map((b,i)=>b[key]!=null?`${xOf(i).toFixed(1)},${yOf(b[key]).toFixed(1)}`:null).filter(Boolean).join(' ');
      return pts?`<polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.6" opacity="0.9"/>`:'';};
    s+=poly('sma200',CO.sma200)+poly('sma20',CO.sma20);
    // entry / target / stop lines
    const hline=(p,col,dash,lbl)=>p==null?'':`<line x1="${mL}" y1="${yOf(p).toFixed(1)}" x2="${mL+pw}" y2="${yOf(p).toFixed(1)}" stroke="${col}" stroke-width="1.2" stroke-dasharray="${dash}"/><text x="${mL+pw+4}" y="${(yOf(p)+3).toFixed(1)}" fill="${col}" font-size="11">${lbl} ${(+p).toFixed(2)}</text>`;
    s+=hline(r.target,CO.target,'5 4','target');
    s+=hline(r.entry,CO.entry,'6 4','entry');
    s+=hline(r.stop,CO.stop,'2 3','stop');
    // candles
    bars.forEach((b,i)=>{const x=xOf(i),up=b.c>=b.o,col=up?CO.up:CO.dn;
      s+=`<line x1="${x.toFixed(1)}" y1="${yOf(b.h).toFixed(1)}" x2="${x.toFixed(1)}" y2="${yOf(b.l).toFixed(1)}" stroke="${col}" stroke-width="1.1"/>`;
      const yo=yOf(b.o),yc=yOf(b.c);s+=`<rect x="${(x-cw/2).toFixed(1)}" y="${Math.min(yo,yc).toFixed(1)}" width="${cw.toFixed(1)}" height="${Math.max(1,Math.abs(yo-yc)).toFixed(1)}" fill="${col}"/>`;});
    // markers
    bars.forEach((b,i)=>{const x=xOf(i);
      if(/ENTRY/.test(b.event||'')){const y=yOf(b.l)+12;s+=`<path d="M ${x-5} ${y} L ${x+5} ${y} L ${x} ${y-8} Z" fill="${CO.entry}"/><text x="${x}" y="${y+12}" fill="${CO.entry}" font-size="10" text-anchor="middle">BUY</text>`;}
      if(/TARGET|STOP —|SELL-OFF/.test(b.event||'')){const c2=/TARGET/.test(b.event)?CO.target:(/SELL-OFF/.test(b.event)?CO.selloff:CO.stop);
        s+=`<line x1="${x.toFixed(1)}" y1="${mT}" x2="${x.toFixed(1)}" y2="${mT+ph}" stroke="${c2}" stroke-width="1" stroke-dasharray="4 3"/><text x="${x}" y="${mT+11}" fill="${c2}" font-size="10" text-anchor="middle">EXIT</text>`;}});
    return s+`</svg>`;
  }

  function card(r) {
    const ex=r.exit||{};
    const hasT=r.target!=null;
    const tape=(r.timeline||[]).map(x=>{let e=x.event||'',rc='';
      if(/TARGET|STOP exit|SELL-OFF/.test(e))rc='r-exit';else if(/ENTRY/.test(e))rc='r-entry';else if(/trail|breakeven|\+1R|ARMED/.test(e))rc='r-stopmove';else if(x.shares===0&&x.if_held!=null)rc='r-flat';
      return `<tr class="${rc}"><td class="num">${x.t}</td><td class="num">${f2(x.o)}</td><td class="num">${f2(x.h)}</td><td class="num">${f2(x.l)}</td><td class="num">${f2(x.c)}</td>
        <td class="num">${f2(x.sma20)}</td><td class="num">${f2(x.sma200)}</td><td class="num">${x.stop!=null?'$'+f2(x.stop):''}</td>
        <td class="num">${x.shares||''}</td><td class="ev">${esc(e)}</td></tr>`;}).join('');
    const plpct=(r.position_cost)?(r.realized_pl/r.position_cost*100):null;
    return `<div class="card"><h2>${r.symbol} <span class="badge badge-muted">${esc(r.tv)}</span>
        <span class="pill">gap ${r.premarket_gap_pct>0?'+':''}${r.premarket_gap_pct}% · ${f2(r.prev_close)}→${f2(r.today_open)} · armed ${r.arm_t} · ${esc(r.loc)}</span></h2>
      <div class="funded">bought <b>${r.shares} @ $${f2(r.entry)}</b> (placed $${f2(r.position_cost)}) · stop <b>$${f2(r.stop)}</b> (${r.risk_pct}%, wick)${hasT?` · target <b>$${f2(r.target)}</b> (3R)`:` · <b>push-trail</b>`} ·
        exit $${f2(ex.price)} @ ${ex.time||''} → <b class="${cls(r.realized_pl)}">${money(r.realized_pl)}</b> (${plpct!=null?(plpct>=0?'+':'')+plpct.toFixed(2)+'%':''})</div>
      <div class="legend">
        <span><span class="swatch" style="background:#69f0ae"></span>up</span><span><span class="swatch" style="background:#ef5350"></span>down</span>
        <span><span class="swatch" style="background:#7c8aff"></span>SMA20</span><span><span class="swatch" style="background:#ffa726"></span>SMA200</span>
        <span><span class="swatch" style="background:#c77dff"></span>entry</span><span><span class="swatch" style="background:#ff1744"></span>stop</span>
        ${hasT?'<span><span class="swatch" style="background:#00c853"></span>target 3R</span>':''}<span><span class="swatch" style="background:#ffc107"></span>${(r.selloff_min||30)}-min sell-off</span></div>
      <div class="chart-wrap">${chart(r)}</div>
      <details><summary>exact 2-min numbers</summary>
        <table class="tape"><tr><th>Time</th><th class="num">O</th><th class="num">H</th><th class="num">L</th><th class="num">C</th>
          <th class="num">SMA20</th><th class="num">SMA200</th><th class="num">Stop</th><th class="num">Sh</th><th>Event</th></tr>${tape}</table></details></div>`;
  }

  function panelBody(p) {
    const t=p.totals;
    let h=`<div class="apptot ${cls(t.realized_pl)}">${money(t.realized_pl)} <span class="flat" style="font-size:0.8rem">(${t.avg_pct>=0?'+':''}${t.avg_pct}%/trade · ${t.names} trades · charts: top ${t.shown})</span></div>`;
    h+= p.rows.length ? p.rows.map(card).join('') : '<div class="empty">no qualifying trades this day</div>';
    return h;
  }

  function renderDay(d) {
    // Baseline column represents the IMPROVED arm gate (sim arm: power bar + >200-SMA), falling
    // back to the as-is TIGHT baseline only if the improved panel isn't present for that day.
    const improved=!!d.base_simarm, bpan=d.base_simarm||d.baseline;
    const s=d.sweet.totals, b=bpan.totals;
    const blabel=improved?'Baseline + sim arm':'Baseline';
    let html=`<div class="stat-row">
      <div class="stat"><div class="value ${cls(s.realized_pl)}">${money(s.realized_pl)}</div><div class="label">New-sim P&L (${s.avg_pct>=0?'+':''}${s.avg_pct}%/trade)</div></div>
      <div class="stat"><div class="value ${cls(b.realized_pl)}">${money(b.realized_pl)}</div><div class="label">${blabel} P&L (${b.avg_pct>=0?'+':''}${b.avg_pct}%/trade)</div></div>
      <div class="stat"><div class="value">${s.names} / ${b.names}</div><div class="label">trades: new-sim / ${improved?'sim-arm':'baseline'}</div></div>
      <div class="stat"><div class="value" style="font-size:0.92rem">${esc(d.source||'')}</div><div class="label">${d.day} · data source · ≤$300 only</div></div></div>`;
    html+=`<div class="split">
      <div class="appcol"><div class="apphdr base">⚙ ${improved?'BASELINE + SIM ARM — power bar + close&gt;200-SMA (no TIGHT) · wick stop · push-trail · 30-min':'BASELINE — live rules (TIGHT on · loc by open · wick stop · push-trail · 30-min)'}</div>${panelBody(bpan)}</div>
      <div class="appcol"><div class="apphdr sweet">★ NEW SIM — ${esc(d.sweet_rules || 'sweet-spot (TIGHT off · loc by close · wick stop · 3R target · 30-min)')}</div>${panelBody(d.sweet)}</div>
    </div>`;
    document.getElementById('day').innerHTML=html;
  }

  function renderSummary(c) {
    if(!c){document.getElementById('day').innerHTML='<div class="empty">no compound data — run sim_variant_ibkr_days.py</div>';return;}
    const col=(s,label,klass)=>{
      let h=`<div class="apphdr ${klass}">${label}</div>`;
      h+=`<div class="apptot ${cls(s.end-c.capital)}">$${s.start.toFixed(0)} → $${s.end.toFixed(2)} <span class="flat" style="font-size:0.82rem">(${s.total_pct>=0?'+':''}${s.total_pct}% · ${s.curve.length} days)</span></div>`;
      h+=s.curve.map(r=>{
        const picks=(r.picks||[]).map(p=>`<tr><td class="sym">${p.sym}</td><td class="num ${cls(p.gap_pct)}">${p.gap_pct>0?'+':''}${p.gap_pct}%</td><td class="num ${cls(p.ret_pct)}">${p.ret_pct>=0?'+':''}${p.ret_pct}%</td><td class="num ${cls(p.ret_usd)}">${money(p.ret_usd)}</td></tr>`).join('')||'<tr><td colspan="4" class="empty">no picks (slots in cash)</td></tr>';
        return `<div class="card" style="padding:12px">
          <div class="funded"><b>${r.day}</b> · slot $${r.slot.toFixed(2)} × ${r.n} · day <b class="${cls(r.day_pl)}">${money(r.day_pl)}</b> (${r.day_ret_pct>=0?'+':''}${r.day_ret_pct}%) → capital <b>$${r.capital.toFixed(2)}</b></div>
          <table class="tape"><tr><th>Stock</th><th class="num">Gap</th><th class="num">Return %</th><th class="num">Return $</th></tr>${picks}</table></div>`;
      }).join('');
      return h;
    };
    document.getElementById('day').innerHTML=`
      <div class="stat-row">
        <div class="stat"><div class="value ${cls(c.sweet.end-c.capital)}">$${c.sweet.end.toFixed(2)}</div><div class="label">New-sim final (${c.sweet.total_pct>=0?'+':''}${c.sweet.total_pct}%)</div></div>
        <div class="stat"><div class="value ${cls(c.baseline.end-c.capital)}">$${c.baseline.end.toFixed(2)}</div><div class="label">Baseline final (${c.baseline.total_pct>=0?'+':''}${c.baseline.total_pct}%)</div></div>
        <div class="stat"><div class="value">$${c.capital.toFixed(0)}</div><div class="label">Start capital · ${c.slots} equal slots ($${(c.capital/c.slots).toFixed(0)}/slot)</div></div>
        <div class="stat"><div class="value">${c.sweet.curve.length}</div><div class="label">Days compounded</div></div></div>
      <div class="note" style="margin-bottom:10px">Daily-compounded: each day the <b>first ${c.slots} names to arm</b> get an equal slot (capital/${c.slots}); unused slots sit in cash; the day's P&L compounds into the next day. Stocks &gt;$300 excluded. Per-stock <b>Return $</b> = slot × return%.</div>
      <div class="split">
        <div class="appcol">${col(c.baseline,'⚙ BASELINE — compounded','base')}</div>
        <div class="appcol">${col(c.sweet,'★ NEW SIM — compounded','sweet')}</div></div>`;
  }

  function renderSummary45(c) {
    if(!c){document.getElementById('day').innerHTML='<div class="empty">no 45-min data — re-run sim_variant_ibkr_days.py</div>';return;}
    const col=(imp,curpct,label,klass)=>{
      const dlt=imp.total_pct-curpct;
      let h=`<div class="apphdr ${klass}">${label}</div>`;
      h+=`<div class="apptot ${cls(imp.end-imp.start)}">$${imp.start.toFixed(0)} → $${imp.end.toFixed(2)} <span class="flat" style="font-size:0.8rem">(${imp.total_pct>=0?'+':''}${imp.total_pct}% · current was ${curpct>=0?'+':''}${curpct}% → <b class="${cls(dlt)}">${dlt>=0?'+':''}${dlt.toFixed(1)} pts</b>)</span></div>`;
      h+=imp.curve.map(r=>{
        const picks=(r.picks||[]).map(p=>`<tr><td class="sym">${p.sym}</td><td class="num ${cls(p.gap_pct)}">${p.gap_pct>0?'+':''}${p.gap_pct}%</td><td class="num ${cls(p.ret_pct)}">${p.ret_pct>=0?'+':''}${p.ret_pct}%</td><td class="num ${cls(p.ret_usd)}">${money(p.ret_usd)}</td></tr>`).join('')||'<tr><td colspan="4" class="empty">no picks (cash)</td></tr>';
        return `<div class="card" style="padding:10px"><div class="funded"><b>${r.day}</b> · slot $${r.slot.toFixed(2)} × ${r.n} · <b class="${cls(r.day_pl)}">${money(r.day_pl)}</b> → $${r.capital.toFixed(2)}</div>
          <table class="tape"><tr><th>Stock</th><th class="num">Gap</th><th class="num">Ret %</th><th class="num">Ret $</th></tr>${picks}</table></div>`;
      }).join('');
      return h;
    };
    document.getElementById('day').innerHTML=`
      <div class="stat-row">
        <div class="stat"><div class="value ${cls(c.improved.sweet.end-c.improved.sweet.start)}">$${c.improved.sweet.end.toFixed(0)}</div><div class="label">New-sim 45-min (${c.improved.sweet.total_pct>=0?'+':''}${c.improved.sweet.total_pct}% · was ${c.current.sweet.total_pct}%)</div></div>
        <div class="stat"><div class="value ${cls(c.improved.baseline.end-c.improved.baseline.start)}">$${c.improved.baseline.end.toFixed(0)}</div><div class="label">Baseline 45-min (${c.improved.baseline.total_pct>=0?'+':''}${c.improved.baseline.total_pct}% · was ${c.current.baseline.total_pct}%)</div></div>
        <div class="stat"><div class="value" style="font-size:1rem">gap 2–4% · 3R · 45-min</div><div class="label">improved config</div></div>
        <div class="stat"><div class="value">${c.days}</div><div class="label">days · ${esc(c.window||'')}</div></div></div>

        <div class="stat"><div class="value ${cls(cur.end-CAP)}">$${cur.end.toFixed(0)}</div><div class="label">Current new-sim (${cur.total_pct>=0?'+':''}${cur.total_pct}%) · recent</div></div>
        <div class="stat"><div class="value ${cls(F.above_both.total_pct-F.current.total_pct)}">${F.current.total_pct}% → ${F.above_both.total_pct}%</div><div class="label">Full ${F.days}d: current → above-both (${(F.above_both.total_pct-F.current.total_pct>=0?'+':'')}${(F.above_both.total_pct-F.current.total_pct).toFixed(1)} pts)</div></div>
        <div class="stat"><div class="value" style="font-size:0.92rem">loss filter</div><div class="label">arm must close &gt; 20-SMA too</div></div></div>
      <div class="banner" style="background:rgba(0,200,83,0.08);border:1px solid var(--ok)">
        <b>The one robust loss-reducer found.</b> New-sim currently arms on <i>close &gt; 200-SMA</i>; this adds <b>and close &gt; 20-SMA</b> (arm bar above BOTH MAs).
        It drops the single consistently-losing subset — entries below the fast MA (~20–24% win rate). <b>Full window ${F.current.total_pct}% → ${F.above_both.total_pct}% (+${(F.above_both.total_pct-F.current.total_pct).toFixed(1)} pts); recent unchanged (${cur.total_pct}% → ${ab.total_pct}%) — it never hurts.</b>
        Exit-side cuts (breakeven/MAE/no-progress) and the regime gate were all tested and traded off profit ≥1:1 — only this selection filter helped. Research only; the live baseline is unchanged.</div>
      <div class="split">
        <div class="appcol">${col(cur,null,'⚙ CURRENT — close &gt; 200-SMA','base')}</div>
        <div class="appcol">${col(ab,cur.total_pct,'🛡 ABOVE-BOTH — &gt; 20-SMA & 200-SMA','sweet')}</div></div>`;
  }

  function renderRiskSizing(rs) {
    if(!rs||!rs.series){document.getElementById('day').innerHTML='<div class="empty">no risk-sizing data — re-run sim_variant_ibkr_days.py</div>';return;}
    const T=rs.totals;
    const rows=rs.series.slice().reverse().map(s=>`<tr>
        <td class="sym">${s.day}</td>
        <td class="num ${cls(s.base_pl)}">${money(s.base_pl)}</td>
        <td class="num ${cls(s.risk_pl)}">${money(s.risk_pl)}</td>
        <td class="num ${cls(s.delta)}">${money(s.delta)}</td>
        <td class="num">${s.n}</td>
        <td class="num">${s.n_down||0}</td></tr>`).join('');
    document.getElementById('day').innerHTML=`
      <div class="stat-row">
        <div class="stat"><div class="value ${cls(T.risk_pl)}">${money(T.risk_pl)}</div><div class="label">Risk-sized net (${rs.days}d · all armed names)</div></div>
        <div class="stat"><div class="value ${cls(T.base_pl)}">${money(T.base_pl)}</div><div class="label">Baseline net (fixed $${(+rs.slot).toFixed(0)} slot)</div></div>
        <div class="stat"><div class="value ${cls(T.delta)}">${money(T.delta)}</div><div class="label">Δ risk-sized − baseline</div></div>
        <div class="stat"><div class="value">${T.n_down} / ${T.n_trades}</div><div class="label">trades sized down (risk&gt;${rs.cap_pct}%) / total</div></div></div>
      <div class="banner" style="background:rgba(124,138,255,0.10);border:1px solid var(--accent)">
        <b>Risk-based sizing — the "size DOWN instead of skip" option</b> (the alternative to the live 3% risk-cap that skipped OUST/VRDN).
        Same baseline arm + exit and the same gap-0.5–4% trade selection; <b>only the share count changes</b>.
        Each trade is sized to risk <b>$${(+rs.r_usd).toFixed(2)}</b> (= ${rs.cap_pct}% of the $${(+rs.slot).toFixed(0)} slot):
        <b>shares = min( floor($${(+rs.r_usd).toFixed(2)} ÷ (entry−stop)) , floor($${(+rs.slot).toFixed(0)} ÷ entry) )</b>.
        A wide-bar name — which the <b>live 3% cap SKIPS</b> and the <b>fixed-slot baseline FULL-SLOTS</b> — is instead taken at a <b>smaller</b> size;
        tight-bar names still cap at one slot, so per-trade dollar-risk is held ≤ $${(+rs.r_usd).toFixed(2)}.
        <b>Net over ${rs.days} days: baseline ${money(T.base_pl)} → risk-sized ${money(T.risk_pl)} (Δ ${money(T.delta)}).</b>
        Research only — totals over every armed name at one slot each (same basis as the per-day tabs), not the top-5 compound.</div>
      <table class="tape">
        <tr><th>Day</th><th class="num">Baseline $</th><th class="num">Risk-sized $</th><th class="num">Δ $</th><th class="num">#trades</th><th class="num">#sized-down</th></tr>
        ${rows}
        <tr style="border-top:2px solid var(--border);font-weight:700">
          <td class="sym">TOTAL · ${rs.days}d</td>
          <td class="num ${cls(T.base_pl)}">${money(T.base_pl)}</td>
          <td class="num ${cls(T.risk_pl)}">${money(T.risk_pl)}</td>
          <td class="num ${cls(T.delta)}">${money(T.delta)}</td>
          <td class="num">${T.n_trades}</td>
          <td class="num">${T.n_down}</td></tr>
      </table>`;
  }

  function renderTrendAlign(ta) {
    if(!ta||!ta.baseline){document.getElementById('day').innerHTML='<div class="empty">no trend-align data — re-run sim_variant_ibkr_days.py</div>';return;}
    const trades=c=>(c&&c.curve?c.curve.reduce((s,r)=>s+(r.n||0),0):0);
    const dP=b=>b.on.total_pct-b.off.total_pct;
    const seg=(label,blk)=>{
      const off=blk.off,on=blk.on,d=on.total_pct-off.total_pct,toff=trades(off),ton=trades(on);
      return `<div class="card" style="padding:10px">
        <div class="funded" style="margin-bottom:4px"><b>${label}</b> · ${blk.days}d · ${esc(blk.window||'')}</div>
        <table class="tape">
          <tr><th>Config</th><th class="num">Total %</th><th class="num">Tr</th></tr>
          <tr><td>trend-align OFF</td><td class="num ${cls(off.total_pct)}">${off.total_pct>=0?'+':''}${off.total_pct}%</td><td class="num">${toff}</td></tr>
          <tr><td><b>trend-align ON</b></td><td class="num ${cls(on.total_pct)}">${on.total_pct>=0?'+':''}${on.total_pct}%</td><td class="num">${ton}</td></tr>
          <tr style="border-top:2px solid var(--border);font-weight:700"><td>Δ</td><td class="num ${cls(d)}">${d>=0?'+':''}${d.toFixed(1)} pts</td><td class="num">−${toff-ton}</td></tr>
        </table></div>`;
    };
    const group=(title,sub,klass,g)=>{
      const dIS=dP(g.is),dOOS=dP(g.oos),dFull=dP(g.full),robust=(dIS>0&&dOOS>0);
      return `<div class="appcol">
        <div class="apphdr ${klass}">${title}</div>
        <div class="note" style="margin-bottom:8px">${sub} — IS <b class="${cls(dIS)}">${dIS>=0?'+':''}${dIS.toFixed(1)}</b> · OOS <b class="${cls(dOOS)}">${dOOS>=0?'+':''}${dOOS.toFixed(1)}</b> · full <b class="${cls(dFull)}">${dFull>=0?'+':''}${dFull.toFixed(1)}</b> pts → <b class="${robust?'pos':'neg'}">${robust?'robust (helps BOTH halves)':'not robust'}</b></div>
        ${seg('🟢 IN-SAMPLE (first half)',g.is)}${seg('🧪 OUT-OF-SAMPLE (second half)',g.oos)}${seg('🔵 FULL window',g.full)}</div>`;
    };
    const bIS=dP(ta.baseline.is),bOOS=dP(ta.baseline.oos),bFull=dP(ta.baseline.full),bRobust=(bIS>0&&bOOS>0);
    const verdict=bRobust
      ?'✅ on the LIVE (baseline) arm it is a ROBUST edge — helps in both IS and OOS halves; worth a live shadow A/B'
      :'❌ not robust on the live arm';
    document.getElementById('day').innerHTML=`
      <div class="stat-row">
        <div class="stat"><div class="value ${cls(bOOS)}">${bOOS>=0?'+':''}${bOOS.toFixed(1)} pts</div><div class="label">baseline OUT-OF-SAMPLE Δ</div></div>
        <div class="stat"><div class="value ${cls(bIS)}">${bIS>=0?'+':''}${bIS.toFixed(1)} pts</div><div class="label">baseline in-sample Δ</div></div>
        <div class="stat"><div class="value ${cls(bFull)}">${bFull>=0?'+':''}${bFull.toFixed(1)} pts</div><div class="label">baseline full-window Δ</div></div>
        <div class="stat"><div class="value" style="font-size:1rem">${bRobust?'EDGE':'NO'}</div><div class="label">robust on live arm?</div></div></div>
      <div class="banner" style="background:${bRobust?'rgba(0,200,83,0.08)':'rgba(255,23,68,0.08)'};border:1px solid ${bRobust?'var(--ok)':'var(--fail)'}">
        <b>Trend-align filter:</b> require the <b>20-SMA &gt; 200-SMA</b> at the arm bar (MAs stacked bullishly) — it consumes the SMA20-vs-200 direction the live classifier currently <i>discards</i>. Subtractive: it only drops non-aligned arms.
        <b>Verdict: ${verdict}.</b> On the <b>live (baseline) arm</b> — where price can be above the SMA band by OPEN while the MAs trend DOWN — it drops the downtrend pop-ups (~18 of 277 trades) and lifts <b>+${bFull.toFixed(1)} pts over 61d</b>, in BOTH halves. On the <b>sweet-spot</b> it barely fires (sweet already gates close&gt;200, which correlates with 20&gt;200). <b>Backtest only — a positive sim is NOT a live-arm trigger</b>; next step is wiring <code>OPENING_REQUIRE_TREND_ALIGN</code> + a live shadow A/B (same discipline as REQUIRE_TIGHT). Full IBKR universe (231 names), compounded $1000/5 by arm time.</div>
      <div class="split">
        ${group('⚙ BASELINE — live classifier (discards SMA dir today)','the faithful test','base',ta.baseline)}
        ${group('★ SWEET-SPOT — already gates close>200','near-redundant here','sweet',ta.sweet)}
      </div>`;
  }

  function renderCombos(cb) {
    if(!cb||!cb.rows){document.getElementById('day').innerHTML='<div class="empty">no combo data — re-run sim_variant_ibkr_days.py</div>';return;}
    const trades=c=>(c&&c.curve?c.curve.reduce((s,r)=>s+(r.n||0),0):0);
    const cell=c=>`<td class="num ${cls(c.total_pct)}">${c.total_pct>=0?'+':''}${c.total_pct}% <span class="flat" style="font-size:0.78rem">(${trades(c)})</span></td>`;
    const best=cb.rows.find(r=>r.best)||cb.rows[0];
    const rows=cb.rows.map(r=>{
      const s=r.splits, rob=(s.is.total_pct>0&&s.oos.total_pct>0);
      return `<tr style="${r.best?'background:rgba(0,200,83,0.10);font-weight:600':''}">
        <td>${r.best?'🏆 ':''}${esc(r.label)}</td>${cell(s.is)}${cell(s.oos)}${cell(s.full)}
        <td class="num">${rob?'<span class="badge badge-ok">robust</span>':'<span class="badge badge-warn">weak</span>'}</td></tr>`;
    }).join('');
    const bf=best.splits.full, bi=best.splits.is, bo=best.splits.oos;
    document.getElementById('day').innerHTML=`
      <div class="stat-row">
        <div class="stat"><div class="value ${cls(bf.total_pct)}">${bf.total_pct>=0?'+':''}${bf.total_pct}%</div><div class="label">🏆 sweet45 + trend-align · full ${cb.days}d</div></div>
        <div class="stat"><div class="value ${cls(bi.total_pct)}">${bi.total_pct>=0?'+':''}${bi.total_pct}%</div><div class="label">in-sample (chop ${cb.is_days}d)</div></div>
        <div class="stat"><div class="value ${cls(bo.total_pct)}">${bo.total_pct>=0?'+':''}${bo.total_pct}%</div><div class="label">out-of-sample (trend ${cb.oos_days}d)</div></div>
        <div class="stat"><div class="value" style="font-size:0.9rem">sweet45ta</div><div class="label">OPENING_STRATEGY_PROFILE=</div></div></div>
      <div class="banner" style="background:rgba(0,200,83,0.08);border:1px solid var(--ok)">
        <b>Most profitable robust config: sweet45 + trend-align.</b> It stacks the two levers that survive an IS/OOS split — the dominant <b>gap 2–4% + 45-min + 3R-target</b> engine (+9 pts over sweet30) and the <b>trend-align</b> chop-insurance filter (SMA20&gt;200), which more than doubles the in-sample/choppy-regime return (+2.0 → +4.4) for a small OOS give-back, on fewer trades.
        <b>Above-both is dropped</b> — it helps sweet30 but slightly HURTS sweet45 (config-dependent). <b>When:</b> long-only opening-range continuation — earns in trending mornings (OOS), and trend-align keeps it positive in chop (IS). Backtest on the IBKR 231-name universe (top-5/day, $1000/5 compounded) — a rules test, not the live scan; magnitudes optimistic, the ordering is the signal. Run it: <code>profiles.py set sweet45ta</code> (live shadow A/B before arming).</div>
      <table class="tape">
        <tr><th>Config</th><th class="num">IS · chop ${cb.is_days}d</th><th class="num">OOS · trend ${cb.oos_days}d</th><th class="num">FULL ${cb.days}d</th><th class="num">IS+OOS</th></tr>
        ${rows}
      </table>
      <div class="note" style="margin-top:8px">% = compounded $1,000 / 5 slots over the window; (n) = total compounded trades. <b>robust</b> = positive in BOTH the in-sample and out-of-sample halves.</div>`;
  }

  // tabs
  const tabs=document.getElementById('tabs');
  const setActive=el=>{document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');};
  const stratTab=document.createElement('div');stratTab.className='tab active';stratTab.textContent='📋 Trading Strategy';
  stratTab.onclick=()=>{setActive(stratTab);renderStrategy();};
  tabs.appendChild(stratTab);
  const cbt=document.createElement('div');cbt.className='tab';cbt.textContent='🏆 Best combo';
  cbt.onclick=()=>{setActive(cbt);renderCombos(data.combos);};
  tabs.appendChild(cbt);
  const sumTab=document.createElement('div');sumTab.className='tab';sumTab.textContent='📈 Summary (compounded)';
  sumTab.onclick=()=>{setActive(sumTab);renderSummary(data.compound);};
  tabs.appendChild(sumTab);
  const sumI=document.createElement('div');sumI.className='tab';sumI.textContent='🚀 Summary (improved arm)';
  sumI.onclick=()=>{setActive(sumI);renderSummaryImproved(data.armgate_recent||data.armgate, data.armgate);};
  tabs.appendChild(sumI);
  const t45=document.createElement('div');t45.className='tab';t45.textContent='⚡ 45min setup';
  t45.onclick=()=>{setActive(t45);renderSummary45(data.compound45);};
  tabs.appendChild(t45);
  const tg=document.createElement('div');tg.className='tab';tg.textContent='📨 Telegram (real picks)';
  tg.onclick=()=>{setActive(tg);renderTelegram(data.telegram);};
  tabs.appendChild(tg);
  const scn=data.telegram&&data.telegram.scenarios;
  const tf=document.createElement('div');tf.className='tab';tf.textContent='💧 $15 floor';
  tf.onclick=()=>{setActive(tf);renderScenario(scn,false);};
  tabs.appendChild(tf);
  const trg=document.createElement('div');trg.className='tab';trg.textContent='🌊 $15 + regime gate';
  trg.onclick=()=>{setActive(trg);renderScenario(scn,true);};
  tabs.appendChild(trg);
  const lmt=document.createElement('div');lmt.className='tab';lmt.textContent='🛡 Loss filter';
  lmt.onclick=()=>{setActive(lmt);renderLossFilter(data.lossmin);};
  tabs.appendChild(lmt);
  const rst=document.createElement('div');rst.className='tab';rst.textContent='⚖ Risk-sizing';
  rst.onclick=()=>{setActive(rst);renderRiskSizing(data.risksize_ab);};
  tabs.appendChild(rst);
  const tat=document.createElement('div');tat.className='tab';tat.textContent='📈 Trend-align';
  tat.onclick=()=>{setActive(tat);renderTrendAlign(data.trendalign);};
  tabs.appendChild(tat);
  const ag=data.armgate;
  const ta1=document.createElement('div');ta1.className='tab';ta1.textContent='🔁 Baseline + sim arm';
  ta1.onclick=()=>{setActive(ta1);renderArmgate(ag,'base_simarm','BASELINE + sim arm gate','Take the baseline but arm on the sim gate: a power bar closing above the 200-SMA (no TIGHT), so an upward first 2-min bar places the buy.');};
  tabs.appendChild(ta1);
  const ta2=document.createElement('div');ta2.className='tab';ta2.textContent='🟢 First green bar';
  ta2.onclick=()=>{setActive(ta2);renderArmgate(ag,'firstgreen','FIRST GREEN BAR only','Arm ONLY on the 09:30 bar if it closes green (up), any size. If the first 2-min bar is red/down, the name is skipped for the day — no rolling, no later entry.');};
  tabs.appendChild(ta2);
  data.days.forEach(d=>{const el=document.createElement('div');el.className='tab';
    el.textContent=d.day;el.onclick=()=>{setActive(el);renderDay(d);};tabs.appendChild(el);});
  renderStrategy();
})();
</script>
</body>
</html>
